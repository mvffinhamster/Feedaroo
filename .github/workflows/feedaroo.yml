name: 🦘 Feedaroo

on:
  schedule:
    - cron: "*/15 * * * *"   # 15 percenként (UTC)
  workflow_dispatch:

concurrency:
  group: feedaroo
  cancel-in-progress: true

jobs:
  run-feedaroo:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: 🗓️ Trigger info
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"

      - name: 📦 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 💾 PERSISTENT MEMORY — mindig ugyanaz a kulcs!
      - name: 💾 Restore sent DB from cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: sent_feedaroo.json
          key: feedaroo-sent-db
          restore-keys: |
            feedaroo-sent-db

      - name: 📚 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run Feedaroo (single check window)
        env:
          WEBHOOK:         ${{ secrets.WEBHOOK }}
          FEEDS:           ${{ secrets.FEEDS }}
          KEYWORDS:        ${{ secrets.KEYWORDS }}
          BOT_NAME:        ${{ secrets.BOT_NAME }}
          POS_THRESHOLD:   ${{ secrets.POS_THRESHOLD }}
          SENT_DB:         sent_feedaroo.json
          DEBUG:           "1"
          LOG_FILE:        feedaroo_debug.log
          NEGATIVE_HINTS:  ${{ secrets.NEGATIVE_HINTS }}
          SLANDER_HINTS:   ${{ secrets.SLANDER_HINTS }}
          MCLAREN_TERMS:   ${{ secrets.MCLAREN_TERMS }}
          CHECK_INTERVAL_MINUTES: "999999"   # hogy a loop ne pörögjön tovább
        run: |
          echo "Starting Feedaroo single check..."
          # 4 perc futási ablak elég a parsereknek + postnak
          timeout 240 python main.py || true
          echo "Feedaroo run complete."

      # 💾 Friss állapot mentése UGYANAZZAL a kulccsal → tartós memória
      - name: 💾 Save sent DB to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: sent_feedaroo.json
          key: feedaroo-sent-db

      # 📎 Debug & DB artifact (ellenőrzéshez)
      - name: 📎 Upload artifacts (debug log + DB)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feedaroo-artifacts-${{ github.run_number }}
          path: |
            feedaroo_debug.log
            sent_feedaroo.json
          if-no-files-found: ignore
          retention-days: 14