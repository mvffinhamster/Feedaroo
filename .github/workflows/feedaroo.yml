name: 🦘 Feedaroo

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: feedaroo
  cancel-in-progress: true

jobs:
  run-feedaroo:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: 🗓️ Trigger info
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"

      - name: 📦 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 💾 Restore sent DB from cache
        id: restore-db
        uses: actions/cache/restore@v4
        with:
          path: sent_feedaroo.json
          key: feedaroo-sent-db
          restore-keys: feedaroo-sent-db

      - name: 📚 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run Feedaroo (single check)
        env:
          WEBHOOK:         ${{ secrets.WEBHOOK }}
          FEEDS:           ${{ secrets.FEEDS }}
          KEYWORDS:        ${{ secrets.KEYWORDS }}
          BOT_NAME:        ${{ secrets.BOT_NAME }}
          POS_THRESHOLD:   ${{ secrets.POS_THRESHOLD }}
          SENT_DB:         sent_feedaroo.json
          DEBUG:           "1"
          LOG_FILE:        feedaroo_debug.log
          NEGATIVE_HINTS:  ${{ secrets.NEGATIVE_HINTS }}
          SLANDER_HINTS:   ${{ secrets.SLANDER_HINTS }}
          MCLAREN_TERMS:   ${{ secrets.MCLAREN_TERMS }}
          CHECK_INTERVAL_MINUTES: "999999"
        run: |
          echo "Starting Feedaroo..."
          timeout 240 python main.py || true
          echo "Feedaroo complete."

      - name: 💾 Save sent DB back to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: sent_feedaroo.json
          key: feedaroo-sent-db

      - name: 📎 Upload debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feedaroo-debug-${{ github.run_number }}
          path: feedaroo_debug.log
          if-no-files-found: ignore
          retention-days: 7