name: 🦘 Feedaroo

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (UTC)
  workflow_dispatch:

concurrency:
  group: feedaroo
  cancel-in-progress: true

jobs:
  run-feedaroo:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: 🗓️ Trigger info
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"

      - name: 📦 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 🧠 PERSISTENT MEMORY - fix kulcs, mindkét run típusra ugyanaz!
      - name: 💾 Restore sent DB from cache
        id: restore-db
        uses: actions/cache/restore@v4
        with:
          path: sent_feedaroo.json
          key: feedaroo-sent-db-global-
          restore-keys: |
            feedaroo-sent-db-global-

      - name: 📚 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run Feedaroo (single check)
        env:
          WEBHOOK:         ${{ secrets.WEBHOOK }}
          LOG_WEBHOOK:     ${{ secrets.LOG_WEBHOOK }}
          FEEDS:           ${{ secrets.FEEDS }}
          KEYWORDS:        ${{ secrets.KEYWORDS }}
          BOT_NAME:        ${{ secrets.BOT_NAME }}
          POS_THRESHOLD:   ${{ secrets.POS_THRESHOLD }}
          SENT_DB:         sent_feedaroo.json
          DEBUG:           "1"
          LOG_FILE:        feedaroo_debug.log
          NEGATIVE_HINTS:  ${{ secrets.NEGATIVE_HINTS }}
          CHECK_INTERVAL_MINUTES: "999999"
          RUN_ONCE: "1"   # 👈 ez itt az új fix, ne fusson végtelen ciklusban
        run: |
          echo "Starting Feedaroo..."
          python main.py
          echo "Feedaroo complete."

      # # 💾 SAVE — ugyanazzal a kulccsal, ne hozzon létre új cache-t
      - name: 💾 Save sent DB back to cache
        id: save-db
        if: always()
        uses: actions/cache/save@v4
        with:
          path: sent_feedaroo.json
          key: feedaroo-sent-db-global-${{ github.run_number }}


      # 🪵 LOG — maradhat, de ez csak debug
      - name: 📎 Upload debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feedaroo-debug-${{ github.run_number }}
          path: feedaroo_debug.log
          if-no-files-found: ignore
          retention-days: 7
