name: Feedaroo 🦘

on:
  schedule:
    - cron: "*/15 * * * *"   # 15 percenként (UTC)
  workflow_dispatch:

concurrency:
  group: feedaroo
  cancel-in-progress: true

jobs:
  run-feedaroo:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 🗓️ Trigger info
        run: |
          echo "event: ${{ github.event_name }}"
          echo "utc now: $(date -u '+%Y-%m-%d %H:%M:%S')"

      - name: 📦 Kód letöltése
        uses: actions/checkout@v4

      - name: 🐍 Python beállítása
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 💾 sent DB visszaállítása
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: sent_feedaroo.json
          key: feedaroo-sent-db-${{ github.run_id }}
          restore-keys: |
            feedaroo-sent-db-

      - name: 📚 Könyvtárak telepítése
        run: pip install -r requirements.txt

      - name: 🚀 Feedaroo futtatása (egykörös)
        env:
          WEBHOOK: ${{ secrets.WEBHOOK }}
          FEEDS: ${{ secrets.FEEDS }}
          KEYWORDS: ${{ secrets.KEYWORDS }}
          CHECK_INTERVAL_MINUTES: ${{ secrets.CHECK_INTERVAL_MINUTES }}
          BOT_NAME: ${{ secrets.BOT_NAME }}
          SENT_DB: sent_feedaroo.json
          POS_THRESHOLD: ${{ secrets.POS_THRESHOLD }}
          DEBUG: "1"
          LOG_FILE: "feedaroo_debug.log"
        run: |
          python main.py &
          PID=$!
          sleep 20
          kill $PID || true

      - name: 💾 sent DB mentése cache-be
        if: always()
        uses: actions/cache/save@v4
        with:
          path: sent_feedaroo.json
          key: feedaroo-sent-db-${{ github.run_id }}

      - name: 📎 Debug log feltöltése (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feedaroo-debug-${{ github.run_number }}
          path: feedaroo_debug.log
          if-no-files-found: ignore